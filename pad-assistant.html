<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAD Team Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --color-bg: #0f0f11;
      --color-surface: #16161a;
      --color-surface-2: #1c1c21;
      --color-surface-offset: #222228;
      --color-border: rgba(255,255,255,0.08);
      --color-border-strong: rgba(255,255,255,0.14);
      --color-text: #e8e8f0;
      --color-text-muted: #8888a0;
      --color-text-faint: #55556a;
      --color-primary: #7b68ee;
      --color-primary-hover: #9d8ef5;
      --color-success: #4caf7d;
      --color-warning: #f0a040;
      --color-error: #e05555;
      --color-water: #4a9edd;
      --color-wood: #5cb85c;
      --color-fire: #e8572a;
      --color-dark: #9966cc;
      --color-light: #f5c842;
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── LAYOUT ─── */
    .app-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    /* ─── HEADER ─── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0 0;
      margin-bottom: 4px;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .app-logo svg.logo-icon {
      width: 32px; height: 32px;
      flex-shrink: 0;
    }
    .app-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 0.02em;
    }
    .app-title span { color: var(--color-primary); }

    /* ─── STORAGE WARNING ─── */
    #storage-warning {
      background: rgba(240,160,64,0.12);
      border: 1px solid rgba(240,160,64,0.3);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--color-warning);
      margin-bottom: 8px;
      display: none;
    }

    /* ─── TABS ─── */
    .tabs-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--color-bg);
      padding: 12px 0 0;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 24px;
    }
    .tabs-list {
      display: flex;
      gap: 2px;
      list-style: none;
    }
    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-muted);
      padding: 10px 18px 11px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: 0.02em;
    }
    .tab-btn:hover { color: var(--color-text); }
    .tab-btn.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }
    .tab-btn .tab-icon { width: 16px; height: 16px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── LOADING / ERROR ─── */
    #loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
      color: var(--color-text-muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-state {
      display: none;
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: 8px;
      padding: 20px 24px;
      color: var(--color-error);
      margin: 40px 0;
    }

    /* ─── SHARED COMPONENTS ─── */
    .section-heading {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    .attr-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .attr-dot.water { background: var(--color-water); }
    .attr-dot.wood  { background: var(--color-wood); }
    .attr-dot.fire  { background: var(--color-fire); }
    .attr-dot.dark  { background: var(--color-dark); }
    .attr-dot.light { background: var(--color-light); }

    .attr-bar {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      align-self: stretch;
    }
    .attr-bar.water { background: var(--color-water); }
    .attr-bar.wood  { background: var(--color-wood); }
    .attr-bar.fire  { background: var(--color-fire); }
    .attr-bar.dark  { background: var(--color-dark); }
    .attr-bar.light { background: var(--color-light); }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .owned-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(76,175,125,0.15);
      border: 1px solid rgba(76,175,125,0.35);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-success);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-ghost {
      background: var(--color-surface-offset);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover { color: var(--color-text); border-color: var(--color-border-strong); }
    .btn-owned {
      background: rgba(76,175,125,0.15);
      color: var(--color-success);
      border: 1px solid rgba(76,175,125,0.3);
    }
    .btn-owned:hover {
      background: rgba(76,175,125,0.25);
    }
    .btn-not-owned {
      background: var(--color-surface-offset);
      color: var(--color-text-faint);
      border: 1px solid var(--color-border);
    }
    .btn-not-owned:hover {
      color: var(--color-text-muted);
      border-color: var(--color-border-strong);
    }
    .btn .btn-icon { width: 14px; height: 14px; }

    /* ─── CARD IMAGE ─── */
    .card-thumb {
      width: 48px; height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--color-surface-offset);
    }
    .card-thumb-fallback {
      width: 48px; height: 48px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      opacity: 0.8;
    }

    /* ─── VIEW 1: MY BOX ─── */
    .box-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
    }
    .search-input-wrap .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--color-text-faint);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 7px;
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 9px 12px 9px 34px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--color-primary); }
    .search-input::placeholder { color: var(--color-text-faint); }

    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-chip {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--color-text-muted);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-chip:hover { border-color: var(--color-border-strong); color: var(--color-text); }
    .filter-chip.active {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: rgba(123,104,238,0.1);
    }
    .filter-chip.active.water  { border-color: var(--color-water); color: var(--color-water); background: rgba(74,158,221,0.1); }
    .filter-chip.active.wood   { border-color: var(--color-wood); color: var(--color-wood); background: rgba(92,184,92,0.1); }
    .filter-chip.active.fire   { border-color: var(--color-fire); color: var(--color-fire); background: rgba(232,87,42,0.1); }
    .filter-chip.active.dark   { border-color: var(--color-dark); color: var(--color-dark); background: rgba(153,102,204,0.1); }
    .filter-chip.active.light  { border-color: var(--color-light); color: var(--color-light); background: rgba(245,200,66,0.1); }
    .filter-chip.active.god    { border-color: var(--color-primary); color: var(--color-primary); background: rgba(123,104,238,0.1); }

    .box-stats {
      font-size: 12px;
      color: var(--color-text-faint);
      margin-bottom: 12px;
    }
    .box-stats strong { color: var(--color-primary); }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .card-item {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .card-item:hover { border-color: var(--color-border-strong); }
    .card-item.owned {
      border-color: rgba(76,175,125,0.35);
      background: rgba(76,175,125,0.04);
    }

    .card-item-info { flex: 1; min-width: 0; }
    .card-item-id {
      font-size: 10px;
      color: var(--color-text-faint);
      margin-bottom: 1px;
    }
    .card-item-name-en {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-item-name-jp {
      font-size: 11px;
      color: var(--color-text-muted);
    }
    .card-item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    /* ─── VIEW 2: TEAM BUILDER ─── */
    .template-select-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .template-select-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .select-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      font-weight: 600;
    }
    .styled-select {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 7px;
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      min-width: 280px;
    }
    .styled-select:focus { border-color: var(--color-primary); }

    .template-meta {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
    }
    .template-meta-desc {
      flex: 1;
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.6;
    }
    .template-meta a {
      color: var(--color-primary);
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .template-meta a:hover { color: var(--color-primary-hover); }

    /* coverage bar */
    .coverage-bar {
      margin-bottom: 22px;
    }
    .coverage-bar-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .coverage-bar-slots {
      display: flex;
      gap: 6px;
    }
    .coverage-slot-pill {
      flex: 1;
      height: 28px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.04em;
    }
    .coverage-slot-pill.green {
      background: rgba(76,175,125,0.18);
      border: 1px solid rgba(76,175,125,0.4);
      color: var(--color-success);
    }
    .coverage-slot-pill.amber {
      background: rgba(240,160,64,0.15);
      border: 1px solid rgba(240,160,64,0.35);
      color: var(--color-warning);
    }
    .coverage-slot-pill.red {
      background: rgba(224,85,85,0.12);
      border: 1px solid rgba(224,85,85,0.3);
      color: var(--color-error);
    }

    /* slot cards 2-col grid */
    .slots-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 750px) { .slots-grid { grid-template-columns: 1fr; } }

    .slot-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      overflow: hidden;
    }
    .slot-card-header {
      background: var(--color-surface-2);
      padding: 9px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slot-position-badge {
      background: var(--color-primary);
      color: #fff;
      width: 22px; height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .slot-role-label {
      font-size: 11px;
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-left: auto;
    }

    .slot-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--color-border);
    }
    .slot-section:last-child { border-bottom: none; }
    .slot-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .rec-card-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rec-card-info { flex: 1; min-width: 0; }
    .rec-card-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rec-card-sub {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .rec-card-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      color: var(--color-primary);
      font-size: 11px;
      text-decoration: none;
      margin-top: 3px;
    }
    .rec-card-link:hover { color: var(--color-primary-hover); }

    /* alternatives */
    .alt-list { display: flex; flex-direction: column; gap: 6px; }
    .alt-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--color-surface-offset);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .alt-rank {
      font-size: 10px;
      font-weight: 700;
      color: var(--color-text-faint);
      width: 14px;
      flex-shrink: 0;
    }
    .alt-thumb {
      width: 32px; height: 32px;
      border-radius: 4px;
      object-fit: cover;
      background: var(--color-surface-2);
    }
    .alt-info { flex: 1; min-width: 0; }
    .alt-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .alt-score {
      font-size: 11px;
      color: var(--color-text-faint);
    }
    .no-alts {
      font-size: 12px;
      color: var(--color-text-faint);
      font-style: italic;
    }

    /* latents */
    .latent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 6px;
    }
    .latent-pill {
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--color-text-muted);
    }
    .slot-notes {
      font-size: 12px;
      color: var(--color-text-muted);
      font-style: italic;
      line-height: 1.5;
    }

    /* assist */
    .assist-priority-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 8px;
    }
    .assist-priority-list li {
      font-size: 12px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .assist-priority-list li::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--color-primary);
      flex-shrink: 0;
    }
    .owned-assists-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-faint);
      font-weight: 600;
      margin: 8px 0 5px;
    }
    .owned-assist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(76,175,125,0.08);
      border: 1px solid rgba(76,175,125,0.2);
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 4px;
    }
    .owned-assist-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-success);
    }
    .owned-assist-tags {
      font-size: 11px;
      color: var(--color-text-faint);
    }
    .no-owned-assist {
      font-size: 12px;
      color: var(--color-text-faint);
      font-style: italic;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: var(--color-text-muted);
    }
    .empty-state-icon {
      width: 48px; height: 48px;
      color: var(--color-text-faint);
      margin: 0 auto 16px;
    }
    .empty-state h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 13px; }

    /* ─── VIEW 3: COVERAGE CHECKER ─── */
    .coverage-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .coverage-header h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .coverage-template-name {
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .mechanic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .mechanic-grid { grid-template-columns: 1fr; } }

    .mechanic-row {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

  // ═══════════════════════════════════════════════════════
  //  DATA LOADING
  // ═══════════════════════════════════════════════════════
  async function loadData() {
    try {
      const [cardsRes, assistsRes, templatesRes] = await Promise.all([
        fetch('./data/cards.json'),
        fetch('./data/assists.json'),
        fetch('./data/templates.json'),
      ]);
      if (!cardsRes.ok || !assistsRes.ok || !templatesRes.ok) throw new Error('Fetch failed');
      state.cards = await cardsRes.json();
      state.assists = await assistsRes.json();
      state.templates = await templatesRes.json();
    } catch(e) {
      // Fallback to inline data (works when opened via file:// or fetch is blocked)
      state.cards = INLINE_CARDS;
      state.assists = INLINE_ASSISTS;
      state.templates = INLINE_TEMPLATES;
      if (!state.cards.length) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        return false;
      }
    }
    return true;
  }

  // ═══════════════════════════════════════════════════════
  //  UTILITIES
  // ═══════════════════════════════════════════════════════
  function getCard(id) { return state.cards.find(c => c.id === id); }
  function getAssist(id) { return state.assists.find(a => a.id === id); }
  function isOwned(id) { return state.ownedCards.has(id); }
  function isOwnedAssist(id) { return state.ownedAssists.has(id); }

  function attrColor(attr) {
    const map = { water:'var(--color-water)', wood:'var(--color-wood)', fire:'var(--color-fire)', dark:'var(--color-dark)', light:'var(--color-light)' };
    return map[attr] || 'var(--color-text-faint)';
  }

  function latentName(key) {
    return LATENT_NAMES[key] || key.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  function assistTagName(key) {
    return ASSIST_TAG_NAMES[key] || key.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function imgOrFallback(card, size=48) {
    const url = card.image_url ? card.image_url.replace('{id}', card.id) : null;
    if (url) {
      return `<img class="card-thumb" src="${url}" alt="${card.name_en}" style="width:${size}px;height:${size}px"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="card-thumb-fallback" style="width:${size}px;height:${size}px;background:${attrColor(card.attribute)};display:none">${card.id}</div>`;
    }
    return `<div class="card-thumb-fallback" style="width:${size}px;height:${size}px;background:${attrColor(card.attribute)}">${card.id}</div>`;
  }

  // Group consecutive identical latents: ["sdr","sdr","sdr"] → "3× SDR"
  function formatLatents(arr) {
    if (!arr || !arr.length) return '—';
    const counts = {};
    arr.forEach(k => { counts[k] = (counts[k]||0)+1; });
    return Object.entries(counts).map(([k,n]) => `${n > 1 ? n+'× ' : ''}${latentName(k)}`).join(' + ');
  }

  // Score owned cards against a slot's role_tags
  function scoreAlternatives(slot) {
    const rec = getCard(slot.recommended_card_id);
    if (!rec) return [];
    const targetTags = rec.role_tags || [];
    return state.cards
      .filter(c => c.id !== slot.recommended_card_id && state.ownedCards.has(c.id))
      .map(c => {
        const matches = (c.role_tags || []).filter(t => targetTags.includes(t));
        return { card: c, score: matches.length, total: targetTags.length, matches };
      })
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, 3);
  }

  // Score owned assists against a slot's assist_priority
  function scoreOwnedAssists(slot) {
    const priorities = slot.assist_priority || [];
    return state.assists
      .filter(a => state.ownedAssists.has(a.id) || state.ownedCards.has(a.id))
      .map(a => {
        const tags = a.assist_tags || [];
        const matches = priorities.filter(p => tags.includes(p));
        return { assist: a, score: matches.length, matches };
      })
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, 2);
  }

  // ═══════════════════════════════════════════════════════
  //  VIEW 1 — MY BOX
  // ═══════════════════════════════════════════════════════
  function renderBox() {
    const q = state.boxSearch.toLowerCase();
    let filtered = state.cards.filter(c => {
      if (state.showOwnedOnly && !isOwned(c.id)) return false;
      if (q) {
        const match = c.name_en.toLowerCase().includes(q) ||
                      c.name_jp.includes(q) ||
                      String(c.id).includes(q);
        if (!match) return false;
      }
      if (state.attrFilters.size && !state.attrFilters.has(c.attribute)) return false;
      if (state.typeFilters.size && !c.types.some(t => state.typeFilters.has(t))) return false;
      return true;
    });

    // Owned first
    filtered.sort((a,b) => {
      const ao = isOwned(a.id) ? 0 : 1;
      const bo = isOwned(b.id) ? 0 : 1;
      return ao - bo || a.id - b.id;
    });

    const ownedInDB = state.cards.filter(c => state.ownedCards.has(c.id)).length;
    const ownedCount = [...state.ownedCards].length;
    document.getElementById('box-stats').innerHTML =
      `<strong>${ownedInDB}</strong> of <strong>${state.cards.length}</strong> cards in database owned · Showing <strong>${filtered.length}</strong>`;

    const grid = document.getElementById('cards-grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <i data-lucide="search-x" class="empty-state-icon"></i>
        <h3>No cards found</h3>
        <p>Try adjusting your search or filters.</p>
      </div>`;
      lucide.createIcons();
      return;
    }

    grid.innerHTML = filtered.map(c => {
      const owned = isOwned(c.id);
      const types = (c.types||[]).map(t => `<span class="tag">${t}</span>`).join('');
      return `
      <div class="card-item ${owned ? 'owned' : ''}" data-id="${c.id}">
        <div class="attr-bar ${c.attribute}"></div>
        ${imgOrFallback(c)}
        <div class="card-item-info">
          <div class="card-item-id">#${c.id}</div>
          <div class="card-item-name-en">${c.name_en}</div>
          <div class="card-item-name-jp">${c.name_jp}</div>
          <div class="card-item-meta">${types}</div>
        </div>
        <button class="btn ${owned ? 'btn-owned' : 'btn-not-owned'} toggle-own-btn" data-id="${c.id}" style="flex-shrink:0;font-size:12px">
          <i data-lucide="${owned ? 'check-circle' : 'circle'}" class="btn-icon"></i>
          ${owned ? 'Owned' : 'Own?'}
        </button>
      </div>`;
    }).join('');

    lucide.createIcons();

    grid.querySelectorAll('.toggle-own-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        if (state.ownedCards.has(id)) state.ownedCards.delete(id);
        else state.ownedCards.add(id);
        saveStorage();
        renderBox();
        renderBuilder();
        renderCoverage();
      });
    });
  }

  // ═══════════════════════════════════════════════════════
  //  VIEW 2 — TEAM BUILDER
  // ═══════════════════════════════════════════════════════
  function populateTemplateSelect() {
    const sel = document.getElementById('template-select');
    state.templates.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
    if (state.selectedTemplate) sel.value = state.selectedTemplate;
  }

  function renderBuilder() {
    const sel = document.getElementById('template-select');
    const tplId = sel.value;
    const content = document.getElementById('builder-content');

    if (!tplId) {
      content.innerHTML = `<div class="empty-state">
        <i data-lucide="users" class="empty-state-icon"></i>
        <h3>Select a template</h3>
        <p>Choose a team template from the dropdown above to see slot analysis and recommendations.</p>
      </div>`;
      lucide.createIcons();
      return;
    }

    const tpl = state.templates.find(t => t.id === tplId);
    if (!tpl) return;
    state.selectedTemplate = tplId;
    saveStorage();

    const ownedCount = state.ownedCards.size;
    if (ownedCount === 0) {
      content.innerHTML = `<div class="empty-state">
        <i data-lucide="package" class="empty-state-icon"></i>
        <h3>Add cards to your box first</h3>
        <p>Go to the <strong>My Box</strong> tab and mark what you own. Then come back to see alternatives.</p>
      </div>`;
      lucide.createIcons();
      return;
    }

    // Coverage bar
    const pillsHtml = tpl.slots.map((slot, i) => {
      const rec = getCard(slot.recommended_card_id);
      let cls, label;
      if (!rec) { cls='red'; label='?'; }
      else if (isOwned(slot.recommended_card_id)) { cls='green'; label='✓'; }
      else {
        const alts = scoreAlternatives(slot);
        cls = alts.length ? 'amber' : 'red';
        label = alts.length ? '~' : '✕';
      }
      return `<div class="coverage-slot-pill ${cls}" title="Slot ${i+1}: ${slot.slot_name}">${label}</div>`;
    }).join('');

    // Template meta
    const metaHtml = `
      <div class="template-meta">
        <div class="template-meta-desc">
          <strong style="color:var(--color-text);font-family:'Rajdhani',sans-serif;font-size:16px">${tpl.name}</strong><br>
          ${tpl.description}
        </div>
        <a href="${tpl.gamewith_url}" target="_blank" rel="noopener noreferrer">
          View on GameWith <i data-lucide="external-link" style="width:12px;height:12px"></i>
        </a>
      </div>
    `;

    // Slot cards
    const slotsHtml = tpl.slots.map(slot => {
      const rec = getCard(slot.recommended_card_id);
      const owned = rec && isOwned(rec.id);
      const alts = !owned ? scoreAlternatives(slot) : [];
      const bestAssists = scoreOwnedAssists(slot);

      // RECOMMENDED section
      const recSection = rec ? `
        <div class="slot-section">
          <div class="slot-section-label">Recommended</div>
          <div class="rec-card-row">
            ${imgOrFallback(rec)}
            <div class="rec-card-info">
              <div class="rec-card-name">
                <span class="attr-dot ${rec.attribute}"></span>
                ${rec.name_en}
                <span style="font-size:11px;color:var(--color-text-faint)">#${rec.id}</span>
                ${owned ? '<span class="owned-badge"><i data-lucide="check" style="width:10px;height:10px"></i> Owned</span>' : ''}
              </div>
              <div class="rec-card-sub">${(rec.types||[]).join(', ')} · ${rec.attribute}</div>
              <a class="rec-card-link" href="${rec.gamewith_url}" target="_blank" rel="noopener noreferrer">
                GameWith <i data-lucide="external-link" style="width:11px;height:11px"></i>
              </a>
            </div>
          </div>
        </div>` : `<div class="slot-section"><div class="slot-section-label">Recommended</div>
          <div class="no-alts">Card #${slot.recommended_card_id} not in database.</div></div>`;

      // ALTERNATIVES
      const altSection = !owned ? `
        <div class="slot-section">
          <div class="slot-section-label">Alternatives (from your box)</div>
          ${alts.length ? `<div class="alt-list">${alts.map((x,i) => `
            <div class="alt-item">
              <span class="alt-rank">${i+1}.</span>
              ${imgOrFallback(x.card, 32)}
              <div class="alt-info">
                <div class="alt-name">${x.card.name_en} <span style="font-size:10px;color:var(--color-text-faint)">#${x.card.id}</span></div>
                <div class="alt-score">${x.score}/${x.total} role tags matched (${x.matches.join(', ')})</div>
              </div>
            </div>`).join('')}</div>` : '<div class="no-alts">No alternatives found in your box.</div>'}
        </div>` : '';

      // LATENTS
      const latentSection = `
        <div class="slot-section">
          <div class="slot-section-label">Recommended Latents</div>
          <div class="latent-list">${(slot.recommended_latents||[]).map(l => `<span class="latent-pill">${latentName(l)}</span>`).join('')}</div>
          ${slot.notes ? `<div class="slot-notes">${slot.notes}</div>` : ''}
        </div>`;

      // ASSISTS
      const assistSection = `
        <div class="slot-section">
          <div class="slot-section-label">Assist Priorities</div>
          <ul class="assist-priority-list">
            ${(slot.assist_priority||[]).map(p => `<li>${assistTagName(p)}</li>`).join('')}
          </ul>
          <div class="owned-assists-label">Owned assists matching priorities</div>
          ${bestAssists.length ? bestAssists.map(x => `
            <div class="owned-assist-item">
              <i data-lucide="sparkles" style="width:14px;height:14px;color:var(--color-success);flex-shrink:0"></i>
              <div>
                <div class="owned-assist-name">${x.assist.name_en} <span style="font-size:10px;opacity:0.7">#${x.assist.id}</span></div>
                <div class="owned-assist-tags">Matches: ${x.matches.map(m => assistTagName(m)).join(', ')}</div>
              </div>
            </div>`).join('') : '<div class="no-owned-assist">No matching assists owned for this slot.</div>'}
        </div>`;

      return `
        <div class="slot-card">
          <div class="slot-card-header">
            <span class="slot-position-badge">${slot.position}</span>
            ${slot.slot_name}
            <span class="slot-role-label">${slot.role}</span>
          </div>
          ${recSection}
          ${altSection}
          ${latentSection}
          ${assistSection}
        </div>`;
    }).join('');

    content.innerHTML = `
      ${metaHtml}
      <div class="coverage-bar">
        <div class="coverage-bar-label">Slot Coverage</div>
        <div class="coverage-bar-slots">${pillsHtml}</div>
      </div>
      <div class="slots-grid">${slotsHtml}</div>`;

    lucide.createIcons();
  }

  // ═══════════════════════════════════════════════════════
  //  VIEW 3 — COVERAGE CHECKER
  // ═══════════════════════════════════════════════════════
  function renderCoverage() {
    const content = document.getElementById('coverage-content');
    if (!state.selectedTemplate) {
      content.innerHTML = `<div class="no-template-msg">Select a template in the <strong>Team Builder</strong> tab first.</div>`;
      return;
    }
    const tpl = state.templates.find(t => t.id === state.selectedTemplate);
    if (!tpl) return;

    // Compute coverage from: card awakenings + best-match assist tags for each slot
    const coveredBy = {};

    tpl.slots.forEach(slot => {
      const rec = getCard(slot.recommended_card_id);
      const ownedCard = isOwned(slot.recommended_card_id) ? rec :
        scoreAlternatives(slot).map(x => x.card)[0];

      // Awakenings from card
      if (ownedCard) {
        (ownedCard.awakenings || []).forEach(aw => {
          if (!coveredBy[aw]) coveredBy[aw] = [];
          coveredBy[aw].push(`Slot ${slot.position} (card)`);
        });
      }

      // Best owned assist
      const bestAssists = scoreOwnedAssists(slot);
      if (bestAssists.length) {
        const ba = bestAssists[0];
        (ba.assist.assist_tags || []).forEach(tag => {
          if (!coveredBy[tag]) coveredBy[tag] = [];
          coveredBy[tag].push(`Slot ${slot.position} assist (${ba.assist.name_en})`);
        });
      }
    });

    const mechanicRows = MECHANICS.map(m => {
      const slotsCovering = coveredBy[m.key] || [];
      let status, cls, icon;
      if (slotsCovering.length === 0) { status='❌'; cls='missing'; icon='x-circle'; }
      else if (m.partial && slotsCovering.length < tpl.slots.length) { status='⚠️'; cls='partial'; icon='alert-triangle'; }
      else { status='✅'; cls='covered'; icon='check-circle'; }

      return { m, slotsCovering, status, cls, icon };
    });

    const gridHtml = mechanicRows.map(({m, slotsCovering, status, cls}) => `
      <div class="mechanic-row ${cls}">
        <div class="mechanic-status">${status}</div>
        <div class="mechanic-info">
          <div class="mechanic-name">${m.label}</div>
          <div class="mechanic-covered-by">${slotsCovering.length ? slotsCovering.slice(0,3).join(', ') : '—'}</div>
        </div>
      </div>`).join('');

    const missing = mechanicRows.filter(x => x.cls === 'missing' || x.cls === 'partial');
    const missingHtml = missing.length ? `
      <div class="missing-callout">
        ${missing.map(({m, cls}) => `<p>${cls === 'missing' ? '❌' : '⚠️'} <strong>${m.label}</strong> is ${cls === 'partial' ? 'only partially covered' : 'uncovered'}. ${MECHANIC_WHY[m.key] || ''}</p>`).join('')}
      </div>` : `<div class="owned-badge" style="margin-bottom:12px;font-size:13px">✅ All mechanics covered</div>`;

    content.innerHTML = `
      <div class="coverage-header">
        <h2 class="section-heading">Coverage Report</h2>
        <span class="coverage-template-name">— ${tpl.name}</span>
      </div>
      <div class="mechanic-grid">${gridHtml}</div>
      ${missingHtml}`;

    lucide.createIcons();
  }

  // ═══════════════════════════════════════════════════════
  //  EVENTS
  // ═══════════════════════════════════════════════════════
  function bindEvents() {
    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        btn.setAttribute('aria-selected','true');
        const panel = document.getElementById('tab-' + btn.dataset.tab);
        if (panel) panel.classList.add('active');
        if (btn.dataset.tab === 'coverage') renderCoverage();
      });
    });

    // Box search
    document.getElementById('box-search').addEventListener('input', e => {
      state.boxSearch = e.target.value;
      renderBox();
    });

    // Owned only toggle
    const ownedBtn = document.getElementById('btn-show-owned-only');
    ownedBtn.addEventListener('click', () => {
      state.showOwnedOnly = !state.showOwnedOnly;
      ownedBtn.classList.toggle('btn-primary', state.showOwnedOnly);
      ownedBtn.classList.toggle('btn-ghost', !state.showOwnedOnly);
      renderBox();
    });

    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const filterSet = chip.dataset.filter === 'attr' ? state.attrFilters : state.typeFilters;
        const val = chip.dataset.val;
        if (filterSet.has(val)) { filterSet.delete(val); chip.classList.remove('active'); }
        else { filterSet.add(val); chip.classList.add('active'); }
        renderBox();
      });
    });

    // Template select
    document.getElementById('template-select').addEventListener('change', () => {
      renderBuilder();
      renderCoverage();
    });
  }

  // ═══════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════
  async function init() {
    loadStorage();

    // If first visit (no owned cards), pre-populate from sheet data
    if (state.ownedCards.size === 0) {
      SHEET_OWNED_IDS.forEach(id => state.ownedCards.add(id));
      SHEET_OWNED_ASSIST_IDS.forEach(id => state.ownedAssists.add(id));
      saveStorage();
    }

    const ok = await loadData();
    if (!ok) return;

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('app-main').style.display = 'block';

    // Pre-select first template if none stored
    if (!state.selectedTemplate && state.templates.length) {
      state.selectedTemplate = state.templates[0].id;
      saveStorage();
    }

    populateTemplateSelect();
    bindEvents();
    renderBox();
    renderBuilder();

    lucide.createIcons();
  }

  init();
  </script>
<script data-pplx-inline-edit>
(function () {
  if (window === window.top) return;

  const allowedParentOrigins = ["https://www.perplexity.ai","https://perplexity.ai","https://testing.perplexity.ai","https://staging.perplexity.ai","https://*.preview.i.perplexity.ai","http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"];
  const MAX_FONT_BYTES = 500 * 1024;
  const MAX_TOTAL_FONT_BYTES = 2 * 1024 * 1024;
  let scrollForwarding = false;
  let scrollRaf = 0;
  let trustedTopOrigin = null;

  // Allow entries like "https://*.preview.i.perplexity.ai" — the wildcard
  // matches a single DNS label (no dots), so "https://*.foo" cannot stretch
  // across multiple labels.
  function matchesAllowedOrigin(origin) {
    if (!origin) return false;
    for (const entry of allowedParentOrigins) {
      if (!entry.includes("*")) {
        if (entry === origin) return true;
        continue;
      }
      const pattern = new RegExp(
        "^" +
          entry.replace(/[.+?^${}()|[\]\\]/g, "\\$&").replace(/\*/g, "[^.]+") +
          "$",
      );
      if (pattern.test(origin)) return true;
    }
    return false;
  }

  // Trust decision: when the sender is same-origin-visible (event.origin is a
  // real origin like https://www.perplexity.ai) we trust event.origin directly.
  // When event.origin is "null" (opaque broker srcdoc), we fall back to the
  // broker's stamped `parentOrigin` to identify the top window. The fallback
  // is claim-only — we rely on the browser's native `targetOrigin` enforcement
  // on the response path (see postToTrustedTop) to ensure replies can't be
  // delivered to anyone but the actual top window of that claimed origin.
  function getTrustedParentOrigin(event) {
    const forwardedParentOrigin =
      typeof event.data.parentOrigin === "string" ? event.data.parentOrigin : null;
    const parentOrigin = event.origin === "null" ? forwardedParentOrigin : event.origin;
    return matchesAllowedOrigin(parentOrigin) ? parentOrigin : null;
  }

  // All responses go to window.top with targetOrigin = the allowlisted origin.
  // An attacker that iframes us inside their own null-origin broker can claim
  // any parentOrigin they like, but the browser will drop the reply whenever
  // the real top's origin doesn't match — so the screenshot never leaves.
  function postToTrustedTop(message) {
    if (!trustedTopOrigin) return;
    try {
      window.top.postMessage(message, trustedTopOrigin);
    } catch (_error) {}
  }

  function inlineAll(original, clone) {
    if (original.nodeType !== 1 || clone.nodeType !== 1) return;

    try {
      const computedStyle = getComputedStyle(original);
      // cssText on a computed style is the serialized declaration in modern
      // Chromium/Safari — a single read beats enumerating ~400 longhand
      // properties. Firefox returns "" here, so we fall back on empty.
      const serialized = computedStyle.cssText;
      if (serialized) {
        clone.style.cssText = serialized;
      } else {
        const parts = new Array(computedStyle.length);
        for (let index = 0; index < computedStyle.length; index += 1) {
          const property = computedStyle[index];
          parts[index] = `${property}:${computedStyle.getPropertyValue(property)};`;
        }
        clone.style.cssText = parts.join("");
      }
    } catch (_error) {}

    const originalChildren = original.children;
    const clonedChildren = clone.children;
    for (
      let index = 0;
      index < originalChildren.length && index < clonedChildren.length;
      index += 1

  function extractFontUrl(srcValue) {

    const woff2 = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff2"));
    if (woff2) return woff2[1];

  async function fetchAsDataUri(url) {
    if (fontDataUriCache.has(url)) return fontDataUriCache.get(url);

      const response = await fetch(url, { mode: "cors", credentials: "omit" });

        const blob = await response.blob();

            const reader = new FileReader();
            reader.onloadend = () =>
              resolve(typeof reader.result === "string" ? reader.result : null);
            reader.onerror = () => resolve(null);

          });

      dataUri = null;
    }

  function collectFontFaceRuleTexts() {
    const rules = [];

      let cssRules;
      try {
        cssRules = sheet.cssRules;
      } catch (_error) {
        continue;
      }
      if (!cssRules) continue;
      for (const rule of cssRules) {
        const cssText = rule.cssText || "";
        if (cssText.startsWith("@font-face")) rules.push(cssText);
      }
    }
    return rules;
  }

  async function buildInlinedFontCss() {
    const ruleTexts = collectFontFaceRuleTexts();
    if (ruleTexts.length === 0) return null;

    const resolved = ruleTexts.map((cssText) => {
      if (!SRC_DECLARATION_RE.test(cssText)) return null;
      const srcMatch = cssText.match(/src\s*:\s*([^;}]+)[;}]/i);
      if (!srcMatch) return null;
      const url = extractFontUrl(srcMatch[1]);
      if (!url) return null;
      try {
        return { cssText, url: new URL(url, document.baseURI).href };
      } catch (_error) {
        return null;
      }
    });

    const dataUris = await Promise.all(
      resolved.map((entry) => (entry ? fetchAsDataUri(entry.url) : Promise.resolve(null))),
    );

    const inlined = [];
    let totalBytes = 0;
    for (let index = 0; index < resolved.length; index += 1) {
      const entry = resolved[index];
      const dataUri = dataUris[index];
      if (!entry || !dataUri) continue;
      const approxBytes = dataUri.length * 0.75;
      if (totalBytes + approxBytes > MAX_TOTAL_FONT_BYTES) break;
      totalBytes += approxBytes;
      inlined.push(entry.cssText.replace(SRC_DECLARATION_RE, `src: url("${dataUri}")`));
    }
    return inlined.length > 0 ? inlined.join("\n") : null;
  }

  function stripExternal(clone) {
    const images = clone.querySelectorAll("img");
    for (let index = 0; index < images.length; index += 1) {
      const src = images[index].getAttribute("src");
      if (src && !src.startsWith("data:")) images[index].removeAttribute("src");
    }

    const elements = clone.querySelectorAll("*");
    for (let index = 0; index < elements.length; index += 1) {
      const style = elements[index].style.cssText;
      if (style && style.includes("url(")) {
        elements[index].style.cssText = style.replace(
          /url\(["']?(?!data:)[^)"']*["']?\)/gi,
          "none",
        );
      }
    }
  }

  function emitScroll() {
    scrollRaf = 0;
    if (!scrollForwarding) return;
    postToTrustedTop({
      type: "INLINE_EDIT_SCROLL",
      scrollX: window.scrollX,
      scrollY: window.scrollY,
    });
  }

  window.addEventListener(
    "scroll",
    function () {
      if (!scrollForwarding || scrollRaf) return;
      scrollRaf = requestAnimationFrame(emitScroll);
    },
    { passive: true, capture: true },
  );

  async function handleCaptureRequest(event) {
    const requestId = event.data.requestId;
    const scrollX = window.scrollX;
    const scrollY = window.scrollY;
    const width = window.innerWidth;
    const height = window.innerHeight;

    function postResult(dataUrl) {
      postToTrustedTop({
        type: "INLINE_EDIT_SCREENSHOT_RESULT",
        requestId,
        dataUrl,
        scrollX,
        scrollY,
      });
    }

    try {
      // Wait for any pending web fonts to resolve so both inline metrics and
      // the @font-face inlining below see the same loaded faces.
      if (document.fonts && document.fonts.ready) {
        try {
          await document.fonts.ready;
        } catch (_error) {}
      }

      const clone = document.documentElement.cloneNode(true);
      inlineAll(document.documentElement, clone);

      const removedNodes = clone.querySelectorAll("script,link[rel=\"stylesheet\"],style");
      for (let index = 0; index < removedNodes.length; index += 1) {
        removedNodes[index].remove();
      }

      stripExternal(clone);

      // Re-embed web fonts as data-URI @font-face rules so the SVG rasterizer
      // can resolve them — external font URLs aren't fetched during
      // foreignObject rendering, which would otherwise force a fallback face
      // and change text metrics.
      const inlinedFontCss = await buildInlinedFontCss();
      if (inlinedFontCss) {
        const styleEl = document.createElement("style");
        styleEl.textContent = inlinedFontCss;
        const head = clone.querySelector("head");
        if (head) head.appendChild(styleEl);
        else clone.insertBefore(styleEl, clone.firstChild);
      }

      const html = new XMLSerializer().serializeToString(clone);
      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">` +
        '<foreignObject width="100%" height="100%">' +
        `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${width}px;height:${height}px;overflow:hidden">` +
        `<div style="transform:translate(-${scrollX}px,-${scrollY}px);transform-origin:top left">` +
        html +
        "</div></div></foreignObject></svg>";
      const svgUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      const image = new Image();
      image.onload = function () {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(image, 0, 0);
        postResult(canvas.toDataURL("image/png"));
      };
      image.onerror = function () {
        postResult(null);
      };
      image.src = svgUrl;
    } catch (_error) {
      postResult(null);
    }
  }

  window.addEventListener("message", function (event) {
    if (!event.data) return;
    // Only accept messages from the direct parent frame. Blocks sibling /
    // unrelated-window postMessage senders that could otherwise reach us.
    if (event.source !== window.parent) return;

    const trustedParentOrigin = getTrustedParentOrigin(event);
    if (!trustedParentOrigin) return;
    trustedTopOrigin = trustedParentOrigin;

    if (event.data.type === "INLINE_EDIT_SCROLL_START") {
      scrollForwarding = true;
      emitScroll();
      return;
    }

    if (event.data.type === "INLINE_EDIT_SCROLL_STOP") {
      scrollForwarding = false;
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = 0;
      return;
    }

    if (event.data.type !== "INLINE_EDIT_CAPTURE_REQUEST") return;

    handleCaptureRequest(event);
  });
})();


</script></body>
</html>
